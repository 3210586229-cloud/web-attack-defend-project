<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的文件 - {{ username }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <style>
        body {
            justify-content: flex-start;
            padding-top: 72px;
        }

        .file-panel {
            position: relative;
            z-index: 1;
            width: min(100%, 860px);
            padding: 34px;
            background: rgba(20, 20, 35, 0.86);
            border: 1px solid rgba(100, 180, 255, 0.14);
            border-radius: 20px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
        }

        .file-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .action-link {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(147, 197, 253, 0.22);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        .action-link.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: transparent;
        }

        .action-link:hover {
            border-color: rgba(96, 165, 250, 0.72);
            background: rgba(59, 130, 246, 0.18);
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid rgba(100, 180, 255, 0.14);
            border-radius: 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 560px;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        th {
            color: rgba(255, 255, 255, 0.58);
            font-size: 13px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            color: rgba(255, 255, 255, 0.88);
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .file-name {
            font-weight: 700;
            color: #ffffff;
        }

        .row-actions {
            display: flex;
            gap: 12px;
        }

        .row-actions a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
        }

        .row-actions a:hover {
            color: #bfdbfe;
        }

        .empty {
            padding: 32px 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.56);
        }

        @media (max-width: 520px) {
            body {
                padding-top: 40px;
            }

            .file-panel {
                padding: 24px 18px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <canvas class="particle-canvas"></canvas>
    <h2>{{ username }} 的文件</h2>

    <section class="file-panel">
        <div class="file-actions">
            <a href="/upload" class="action-link primary">上传新文件</a>
            <a href="/profile" class="action-link">返回个人主页</a>
            <a href="/logout" class="action-link">退出登录</a>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for file in files %}
                    <tr>
                        <td class="file-name">{{ file }}</td>
                        <td>
                            <div class="row-actions">
                                <a href="/download?filename={{ file }}">下载</a>
                                <a href="/delete?filename={{ file }}" onclick="return confirm('确定要删除吗？')">删除</a>
                            </div>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td class="empty" colspan="2">当前还没有上传文件</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>

    <script src="{{ url_for('static', filename='particle.js') }}"></script>
</body>
</html>

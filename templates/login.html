<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录--纯大子的网盘</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
<canvas class="particle-canvas"></canvas>
       <h2>登录</h2>
          <form method="post" action="/login">
              <!-- post方法提交数据和数据提交到当前网站的login路径-->
              用户名:<input type="text" name="username" placeholder="用户名" required><br>
              密码：<input type="password" name="password" placeholder="密码" required><br>



              <button type="submit">登录</button>
          </form>
    <script src="{{url_for('static',filename='particle.js')}}"></script>
</body>
</html>
